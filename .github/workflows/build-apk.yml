name: Build Android APK

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-apk.yml'
      - 'README.md'
      - 'handoff.md'
      - 'docs/**'
      - 'scripts/**'
      - 'android/**'
      - 'assets/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'test/**'

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter 3.41.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Prepare generated assets
        run: |
          chmod +x ./scripts/prepare_assets.sh
          ./scripts/prepare_assets.sh

      - name: Install dependencies
        run: flutter pub get

      - name: Run widget and unit tests
        run: flutter test

      - name: Run static analysis
        run: flutter analyze

      - name: Build installable arm64 release APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename APK for download
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/kids-play-app-arm64-v8a-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kids-play-app-arm64-v8a-release
          path: build/app/outputs/flutter-apk/kids-play-app-arm64-v8a-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish run summary
        run: |
          {
            echo '## APK build complete'
            echo ''
            echo '- Artifact: `kids-play-app-arm64-v8a-release`'
            echo '- APK file: `kids-play-app-arm64-v8a-release.apk`'
            echo '- Install target: Galaxy S24 (arm64)'
            echo ''
            echo 'Download path: Actions > latest run > Artifacts > kids-play-app-arm64-v8a-release'
          } >> "$GITHUB_STEP_SUMMARY"
