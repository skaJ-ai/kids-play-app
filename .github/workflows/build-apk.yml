name: Build APK

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    name: Build arm64 release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version info
        run: flutter --version

      # rsync is not always available; plain cp works fine for this repo
      - name: Prepare generated assets
        run: |
          rm -rf assets/generated
          mkdir -p assets/generated
          cp -r assets/public/. assets/generated/

      - name: Flutter pub get
        run: flutter pub get

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Run tests
        run: flutter test

      - name: Build release APK (arm64)
        run: flutter build apk --release --target-platform android-arm64

      - name: Copy APK to deliverables
        run: |
          echo "=== APK files found ==="
          find build/ -name "*.apk" 2>/dev/null || echo "(none)"
          APK=$(find build/ -name "*release*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: no release APK found"; exit 1
          fi
          echo "Using: $APK"
          cp "$APK" deliverables/kids-play-app-arm64-v8a-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kids-play-app-arm64-v8a-release
          path: deliverables/kids-play-app-arm64-v8a-release.apk
          retention-days: 30
