name: kids_play_app
description: "승원이의 빵빵 놀이터 — toddler-friendly offline learning app for Android."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  flutter_tts: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/generated/images/hero/
    - assets/generated/images/categories/
    - assets/generated/audio/voice/prompts/
    - assets/generated/audio/sfx/
    - assets/generated/audio/music/
    - assets/generated/manifest/
