name: kids_play_app
description: "승원이의 빵빵 놀이터 — toddler-friendly offline learning app for Android."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  flutter_tts: ^4.2.3
  path_provider: ^2.1.3
  path: ^1.9.0
  image_picker: ^1.2.1
  crop_your_image: ^2.0.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  shared_preferences_platform_interface: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/generated/images/hero/
    - assets/generated/images/categories/
    - assets/generated/audio/voice/prompts/
    - assets/generated/audio/sfx/
    - assets/generated/audio/music/
    - assets/generated/manifest/
    - assets/mascot/faces/
    - assets/mascot/companion/
    - assets/vectors/
  fonts:
    - family: KCCMurukmuruk
      fonts:
        - asset: assets/fonts/KCCMurukmuruk.ttf
    - family: SUIT
      fonts:
        - asset: assets/fonts/SUIT-Regular.ttf
          weight: 400
        - asset: assets/fonts/SUIT-Medium.ttf
          weight: 500
        - asset: assets/fonts/SUIT-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SUIT-Bold.ttf
          weight: 700
